function wtdFV(d, fvRow) {
  return (d.s1/100)*fvRow.s1 + (d.s2/100)*fvRow.s2 + (d.s3/100)*fvRow.s3 + (d.s4/100)*fvRow.s4;
}

function fmtP(v, unit, dec) {
  if (unit === "$") return v >= 1000 ? `$${v.toLocaleString(undefined,{maximumFractionDigits:dec||0})}` : `$${v.toFixed(dec||0)}`;
  return v.toLocaleString(undefined,{maximumFractionDigits:dec||0});
}

function fmtPct(sv, spot) {
  if (!spot) return "—";
  const p = ((sv - spot) / spot) * 100;
  return `${p >= 0 ? "+" : ""}${p.toFixed(1)}%`;
}

function chgColor(v, isEq) {
  if (Math.abs(v) < 0.005) return C.textDim;
  if (isEq) return v > 0 ? C.up : C.down;
  return v > 0 ? C.up : C.down;
}

function gapInfo(wfv, spot) {
  if (!spot) return { text: "—", color: C.textDim };
  const p = ((wfv - spot) / spot) * 100;
  if (Math.abs(p) < 3) return { text: "Fair", color: C.textMuted };
  return p > 0 ? { text: "Cheap", color: C.up } : { text: "Rich", color: C.down };
}

function pctCol(sv, spot, isEq) {
  if (!spot) return C.textDim;
  const d = sv - spot;
  if (Math.abs(d / spot) < 0.005) return C.textMuted;
  return d > 0 ? (isEq ? C.up : C.up) : (isEq ? C.down : C.down);
}

  const vals = data.map(d => d[key]);
  if (vals.length < 2) return "";
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const pts = vals.map((v, i) =>
    `${(i/(vals.length-1))*w},${h - 3 - ((v-mn)/rng)*(h-6)}`
  ).join(" ");
  const lx = w, ly = h - 3 - ((vals[vals.length-1]-mn)/rng)*(h-6);
  return `<svg width="${w}" height="${h}" style="display:block">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/>
  </svg>`;
}

function probEvoSVG(activeIdx) {
  const w = 700, h = 160, pad = 4, uh = h - pad*2, n = DATA.length;
  const order = ["s4","s3","s2","s1"];
  let cum = DATA.map(() => 0);
  let paths = order.map(s => {
    const points = DATA.map((d, i) => {
      const x = n === 1 ? w/2 : (i/(n-1))*w;
      const yb = pad + uh - (cum[i]/100)*uh;
      const yt = pad + uh - ((cum[i]+d[s])/100)*uh;
      cum[i] += d[s];
      return { x, yt, yb };
    });
    const top = points.map((p,i) => `${i===0?"M":"L"} ${p.x} ${p.yt}`).join(" ");
    const bot = [...points].reverse().map(p => `L ${p.x} ${p.yb}`).join(" ");
    const color = C[s];
    return `<path d="${top} ${bot} Z" fill="${color}" opacity="0.45"/>`;
  });
  const sx = (activeIdx/(n-1))*w;
  paths.push(`<line x1="${sx}" y1="0" x2="${sx}" y2="${h}" stroke="${C.accent}" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`);
  return `<svg width="100%" height="160" viewBox="0 0 700 160" preserveAspectRatio="none">${paths.join("")}</svg>`;
}

function render() {
  const { idx, showPct } = state;
  const cur = DATA[idx];
  const prev = idx > 0 ? DATA[idx-1] : null;
  const d1 = DATA[0];
  const app = document.getElementById("app");

  // header
  let html = `
  <div class="header">
    <div>
      <div class="header-label mono">THRESHER FIXED</div>
      <div class="header-title">Operation Epic Fury</div>
      <div class="header-sub">Scenario tracker — Unstable Equilibria war room</div>
    </div>
    <div class="day-badge">
      <div class="day-label mono">DAY</div>
      <div class="day-num mono">${cur.day}</div>
    </div>
  </div>`;

  // timeline
  html += `<div class="timeline">`;
  const lastIdx = DATA.length - 1;
  DATA.forEach((d, i) => {
    html += `<button class="tl-btn mono${i===idx?" active":""}${i===lastIdx?" today":""}" onclick="setIdx(${i})">
      ${d.label}${i===lastIdx?"<span class=\"today-pip\">TODAY</span>":""}<div class="tl-date">${d.date}</div>
    </button>`;
  });
  html += `</div>`;

  // scenario cards
  html += `<div class="sc-grid">`;
  SCENARIOS.forEach(s => {
    const p = cur[s.key];
    const pp = prev ? prev[s.key] : null;
    const delta = pp !== null ? p - pp : null;
    const deltaHtml = (delta !== null && delta !== 0)
      ? `<span class="sc-delta mono" style="color:${delta>0?C.up:C.down}">${delta>0?"+":""}${delta}pp</span>`
      : "";
    html += `<div class="sc-card">
      <div class="sc-stripe" style="background:${s.color}"></div>
      <div class="sc-tag mono">${s.tag}</div>
      <div><span class="sc-prob mono">${p}%</span>${deltaHtml}</div>
      <div class="sc-label">${s.label}</div>
    </div>`;
  });
  html += `</div>`;

  // prob bar
  html += `<div class="prob-bar">`;
  ["s1","s2","s3","s4"].forEach(s => {
    html += `<div class="prob-seg" style="width:${cur[s]}%;background:${C[s]}"></div>`;
  });
  html += `</div>`;

  // prob evolution chart
  html += `<div class="prob-evo">
    <div class="section-head mono">PROBABILITY EVOLUTION</div>
    <div class="prob-chart-wrap">${probEvoSVG(idx)}</div>
    <div class="prob-dates">`;
  DATA.forEach(d => {
    const lbl = d.date.replace("Feb ","2/").replace("Mar ","3/");
    html += `<span class="prob-date-label mono" style="width:${100/DATA.length}%">${lbl}</span>`;
  });
  html += `</div>
    <div class="legend">`;
  SCENARIOS.forEach(s => {
    html += `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div><span class="mono">${s.tag}</span></div>`;
  });
  html += `</div></div>`;

  // cross-asset levels
  html += `<div class="section-head mono">CROSS-ASSET LEVELS</div>
  <div class="markets-grid">`;
  MARKETS.forEach(m => {
    const cv = cur[m.key];
    const d1v = d1[m.key];
    const chg1d = prev ? ((cv - prev[m.key]) / prev[m.key] * 100) : null;
    const chgD1 = ((cv - d1v) / d1v * 100);
    const c1d = chg1d !== null ? (Math.abs(chg1d) < 0.1 ? C.textDim : chg1d > 0 ? C.up : C.down) : null;
    const cD1 = Math.abs(chgD1) < 0.1 ? C.textDim : chgD1 > 0 ? C.up : C.down;
    const spark = sparkSVG(DATA.slice(0, idx+1), m.key, m.color, 70, 36);
    html += `<div class="mkt-card">
      <div class="mkt-inner">
        <div>
          <div class="mkt-label mono">${m.label}</div>
          <div class="mkt-value mono">${m.fmt(cv)}</div>
          <div class="mkt-changes">
            ${chg1d !== null ? `<span class="chg-badge mono" style="color:${c1d}">1d: ${chg1d>=0?"+":""}${chg1d.toFixed(1)}%</span>` : ""}
            <span class="chg-badge mono" style="color:${cD1}">D1: ${chgD1>=0?"+":""}${chgD1.toFixed(1)}%</span>
          </div>
        </div>
        ${spark}
      </div>
    </div>`;
  });
  html += `</div>`;

  // FV table
  html += `<div class="fv-header">
    <span class="section-head mono" style="margin-bottom:0">SCENARIO FAIR VALUES</span>
    <button class="pct-btn mono${showPct?" active":""}" onclick="togglePct()">${showPct?"% from spot":"Absolute"}</button>
  </div>
  <div class="fv-wrap"><div class="fv-scroll">
  <table>
    <thead><tr>
      <th></th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>Wtd FV</th><th>Spot</th><th>Gap</th>
    </tr></thead>
    <tbody>`;

  FV_ROWS.forEach((row, ri) => {
    const fvData = cur.fv[row.fvKey];
    const spot = cur[row.spotKey];
    const wfv = wtdFV(cur, fvData);
    const gap = gapInfo(wfv, spot);
    const isLast = ri === FV_ROWS.length - 1;

    const cellVal = v => showPct ? fmtPct(v, spot) : fmtP(v, row.unit, row.dec);
    const cellCol = v => showPct ? pctCol(v, spot, row.isEq) : C.textMid;

    const wtdDisplay = showPct ? fmtPct(wfv, spot) : fmtP(Math.round(wfv), row.unit, row.dec);
    const wtdColor = showPct ? pctCol(wfv, spot, row.isEq) : C.text;

    html += `<tr>
      <td>${row.asset}</td>
      ${["s1","s2","s3","s4"].map(s => `<td style="color:${cellCol(fvData[s])}">${cellVal(fvData[s])}</td>`).join("")}
      <td style="color:${wtdColor};font-weight:500">${wtdDisplay}</td>
      <td style="color:${C.textMuted}">${spot ? fmtP(spot, row.unit, row.dec) : "—"}</td>
      <td style="color:${gap.color};font-weight:500">${gap.text}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  // events
  html += `<div class="section-head mono">KEY DEVELOPMENTS — ${cur.label.toUpperCase()} (${cur.date.toUpperCase()})</div>
  <div class="events-wrap">`;
  cur.events.forEach((evt, i) => {
    html += `<div class="evt-row">
      <span class="evt-num mono">${String(i+1).padStart(2,"0")}</span>
      <span class="evt-text">${evt}</span>
    </div>`;
  });
  html += `</div>`;

  // footer
  html += `<div class="footer mono">
    <span>Not investment advice. Scenario analysis for portfolio risk management.</span>
    <span>thresherfixed.com</span>
  </div>`;

  app.innerHTML = html;
}

function setIdx(i) {
  state.idx = i;
  render();
}

function togglePct() {
  state.showPct = !state.showPct;
  render();
}

render();
</script>
